<!DOCTYPE html>
<html>
<head>

<title>Network Monitoring Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{
    color:#38bdf8;
}

.container{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    width:200px;
}

.status{
    font-size:20px;
    margin-top:10px;
}

canvas{
    margin-top:40px;
}

</style>

</head>

<body>

<h1>Network Monitoring Dashboard</h1>

<div class="status">
Status: <span id="status">Checking...</span>
</div>

<div class="container">

<div class="card">
<h3>Connectivity</h3>
<p><span id="connectivity">--</span>%</p>
</div>

<div class="card">
<h3>Bandwidth</h3>
<p><span id="bandwidth">--</span> KB/s</p>
</div>

<div class="card">
<h3>Latency</h3>
<p><span id="latency">--</span> ms</p>
</div>

</div>

<canvas id="networkChart" width="900" height="400"></canvas>

<script src="/static/script.js"></script>

</body>
</html>
